<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 编程助手</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #081126; color: #eef2ff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .hero { margin-bottom: 20px; }
    .title { font-size: 32px; font-weight: 800; margin: 0 0 8px; }
    .sub { color: #a9b6d3; }
    .card { background: #101a39; border: 1px solid #26314f; border-radius: 18px; padding: 18px; margin-bottom: 18px; }
    input, textarea, select, button { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #39476f; background: #0b1430; color: #eef2ff; padding: 12px; font-size: 14px; }
    textarea { min-height: 150px; resize: vertical; }
    button { background: #5b7cff; border: none; font-weight: 700; cursor: pointer; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .muted { color: #a9b6d3; font-size: 13px; }
    .pill { display:inline-block; padding:8px 12px; border-radius:999px; background:#0b1430; border:1px solid #26314f; margin-right:8px; }
    pre { white-space: pre-wrap; word-wrap: break-word; background: #0b1020; padding: 14px; border-radius: 10px; border: 1px solid #26314f; }
    @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="title">AI 编程助手</div>
      <div class="sub">贴代码、贴报错、点发送，即可得到解释和修复建议。</div>
    </div>

    <div class="card">
      <h3>1. 输入访问码</h3>
      <div class="row">
        <input id="accessCode" placeholder="请输入你购买后拿到的访问码，例如 AB12CD34" />
        <button onclick="loginByCode()">登录 / 查询额度</button>
      </div>
      <p id="accountInfo" class="muted">请先输入访问码。</p>
    </div>

    <div class="card">
      <h3>2. 提问</h3>
      <div class="row">
        <div>
          <label>语言 / 技术栈</label>
          <select id="language">
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Java">Java</option>
            <option value="SQL">SQL</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div>
          <label>问题说明</label>
          <input id="prompt" placeholder="例如：帮我解释这个报错，并给出修复后的代码" />
        </div>
      </div>
      <div style="margin-top:12px;">
        <label>代码 / 报错信息</label>
        <textarea id="code" placeholder="把代码或报错日志粘贴在这里"></textarea>
      </div>
      <div style="margin-top:12px;"><button onclick="askClaude()">发送问题</button></div>
      <p id="status" class="muted"></p>
    </div>

    <div class="card">
      <h3>3. 回答</h3>
      <pre id="answer">这里会显示 AI 的返回内容</pre>
    </div>
  </div>

<script>
let currentCode = '';

async function loginByCode() {
  const accessCode = document.getElementById('accessCode').value.trim().toUpperCase();
  if (!accessCode) return alert('请先输入访问码');
  const res = await fetch('/api/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ access_code: accessCode })
  });
  const data = await res.json();
  if (!res.ok) return alert(data.detail || '登录失败');
  currentCode = data.access_code;
  document.getElementById('accountInfo').innerText = `用户：${data.display_name}｜访问码：${data.access_code}｜剩余额度：${data.credits}`;
}

async function askClaude() {
  const accessCode = (document.getElementById('accessCode').value.trim() || currentCode).toUpperCase();
  const prompt = document.getElementById('prompt').value.trim();
  const code = document.getElementById('code').value;
  const language = document.getElementById('language').value;
  if (!accessCode) return alert('请先输入访问码');
  if (!prompt) return alert('请先输入问题说明');

  document.getElementById('status').innerText = '正在请求 AI...';
  document.getElementById('answer').innerText = '处理中，请稍候...';

  const res = await fetch('/api/chat', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ access_code: accessCode, prompt, code, language })
  });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('status').innerText = data.detail || '请求失败';
    document.getElementById('answer').innerText = '请求失败';
    return;
  }
  document.getElementById('status').innerText = `本次消耗 ${data.credits_used} 点，剩余 ${data.credits_left} 点，约合 $${data.cost_usd}，模型：${data.model}`;
  document.getElementById('answer').innerText = data.answer;
  document.getElementById('accountInfo').innerText = `用户：${data.display_name}｜访问码：${accessCode}｜剩余额度：${data.credits_left}`;
}
</script>
</body>
</html>
